default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5460) %>
  username: <%= ENV.fetch("DATABASE_USER", "tracklane_app") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", "tracklane_app") %>
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: tracklane_development

test:
  <<: *default
  database: tracklane_test
  username: <%= ENV.fetch("TEST_DATABASE_USER", "tracklane") %>
  password: <%= ENV.fetch("TEST_DATABASE_PASSWORD", "tracklane") %>

production:
  primary: &primary_production
    <<: *default
    database: tracklane_production
    username: tracklane
    password: <%= ENV["TRACKLANE_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: tracklane_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: tracklane_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: tracklane_production_cable
    migrations_paths: db/cable_migrate
